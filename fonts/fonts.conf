<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <include ignore_missing="yes">conf.d</include>

  <!-- Remove blank glyphs from TempleOS -->
  <match target="scan">
    <test name="family">
      <string>TempleOS</string>
    </test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <!-- Spanish accented characters -->
          <int>0x00E1</int>
          <int>0x00E9</int>
          <int>0x00ED</int>
          <int>0x00F3</int>
          <int>0x00FA</int>
          <int>0x00C1</int>
          <int>0x00C9</int>
          <int>0x00CD</int>
          <int>0x00D3</int>
          <int>0x00DA</int>
          <!-- Cyrillic block U+0400-U+04FF -->
          <range>
            <int>0x0400</int>
            <int>0x04FF</int>
          </range>
        </charset>
      </minus>
    </edit>
  </match>

  <!-- Composite font: TempleOS primary with GeistMono fallback -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>TempleOS Composite</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>TempleOS</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>TempleOS Composite</string>
    </test>
    <edit name="family" mode="append" binding="weak">
      <string>GeistMono Nerd Font</string>
    </edit>
  </match>

  <!-- General fallback chain for TempleOS -->
  <alias>
    <family>TempleOS</family>
    <prefer>
      <family>TempleOS</family>
      <family>GeistMono Nerd Font</family>
    </prefer>
  </alias>

</fontconfig>