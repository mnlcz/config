<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <include ignore_missing="yes">conf.d</include>
  <match target="scan">
    <test name="family">
      <string>TempleOS</string>
    </test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <int>0x00E1</int>
          <int>0x00E9</int>
          <int>0x00ED</int>
          <int>0x00F3</int>
          <int>0x00FA</int>
          <int>0x00C1</int>
          <int>0x00C9</int>
          <int>0x00CD</int>
          <int>0x00D3</int>
          <int>0x00DA</int>
        </charset>
      </minus>
    </edit>
  </match>
  <alias>
    <family>TempleOS</family>
    <prefer>
      <family>TempleOS</family>
      <family>GeistMono Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>