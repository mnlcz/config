[main]
font=Luxi Mono:size=11
dpi-aware=no
pad=8x8
shell=/usr/local/bin/rc -l

[cursor]
style=beam
blink=no

[mouse]
hide-when-typing=yes

[colors]
background=ffffff
foreground=000000

regular0=111111
regular1=993333
regular2=336633
regular3=887722
regular4=000088
regular5=664466
regular6=336666
regular7=888888

bright0=444444
bright1=bb4444
bright2=448844
bright3=aa9933
bright4=2244aa
bright5=886688
bright6=447777
bright7=cccccc

[key-bindings]
scrollback-up-page=Control+u
scrollback-down-page=Control+d
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
