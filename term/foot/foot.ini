[main]
font=Red Hat Mono:style=Regular:size=13
dpi-aware=no
pad=8x8

[cursor]
style=beam
blink=no

[mouse]
hide-when-typing=yes

[colors-dark]
background=f5f5f5
foreground=000000

regular0=222222
regular1=ee0000
regular2=3a7d44
regular3=b8860b
regular4=1a6b8a
regular5=8b3a8b
regular6=1a7b7b
regular7=dddddd

bright0=666666
bright1=ff3b30
bright2=4e9e5a
bright3=d4a017
bright4=2196b0
bright5=b050b0
bright6=20a0a0
bright7=f5f5f5

[key-bindings]
scrollback-up-page=Control+u
scrollback-down-page=Control+d
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r