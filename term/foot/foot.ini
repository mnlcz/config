[main]
font=TempleOS:size=11
dpi-aware=no
pad=8x8

[cursor]
style=beam
blink=no

[mouse]
hide-when-typing=yes

[colors-dark]
background=ffffff
foreground=000000

regular0=101010
regular1=a80000
regular2=00a800
regular3=ffff57
regular4=0000a8
regular5=a800a8
regular6=57ffff
regular7=ffffff

bright0=101010
bright1=a80000
bright2=00a800
bright3=ffff57
bright4=0000a8
bright5=a800a8
bright6=57ffff
bright7=ffffff

[key-bindings]
scrollback-up-page=Control+u
scrollback-down-page=Control+d
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
