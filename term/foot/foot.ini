[main]
font=TempleOS Composite:size=11,GeistMono Nerd Font:size=16
dpi-aware=no
pad=8x8

[cursor]
style=beam
blink=no

[mouse]
hide-when-typing=yes

[colors]
background=ffffff
foreground=000000

regular0=1a1a1a
regular1=cc0000
regular2=008000
regular3=8b6914
regular4=0000cc
regular5=8b008b
regular6=008080
regular7=666666

bright0=404040
bright1=dd0000
bright2=009900
bright3=9a7520
bright4=2222dd
bright5=9900aa
bright6=007070
bright7=1a1a1a

[key-bindings]
scrollback-up-page=Control+u
scrollback-down-page=Control+d
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
