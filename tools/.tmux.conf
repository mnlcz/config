# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General
set -g mode-keys vi
set -g status-keys vi
set -g default-terminal "foot"
set -a terminal-features 'foot:RGB'
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

# General binds
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key s source $HOME/.tmux.conf
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key P display-popup -E "psysh"
bind-key T display-popup -w 80% -h 80% -d "#{pane_current_path}" -E $SHELL
bind-key M display-popup -w 95% -h 95% -E 'bash -i -c "x man"'

# Wayland clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key ] run "wl-paste | tmux load-buffer - && tmux paste-buffer"
set -g update-environment "WAYLAND_DISPLAY DISPLAY XAUTHORITY XDG_RUNTIME_DIR"

# Colors
BG="#f5f5f5"
FG="#000000"
RED="#ee0000"
GRAY="#aaaaaa"
DARKGRAY="#666666"

# Status bar
set -g status-style "bg=${BG},fg=${FG}"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[fg=${RED},bold]#S #[fg=${DARKGRAY}]│ "
set -g status-right "#[fg=${DARKGRAY}]%a %d %b #[fg=${RED},bold]%H:%M"

# Windows
set -g window-status-format "#[fg=${DARKGRAY}] #I:#W "
set -g window-status-current-format "#[fg=${RED},bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=${GRAY}"
set -g pane-active-border-style "fg=${RED}"

# Messages and command prompt
set -g message-style "bg=${BG},fg=${RED}"
set -g message-command-style "bg=${BG},fg=${FG}"

# Copy mode
set -g mode-style "bg=${RED},fg=${FG}"

# Popups
set -g popup-border-style "fg=${RED}"
set -g popup-style "bg=${BG}"