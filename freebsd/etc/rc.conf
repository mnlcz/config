clear_tmp_enable="YES"
hostname="freebsd"
keymap="latinamerican.acc.kbd"
ifconfig_re0="DHCP"
ifconfig_re0_ipv6="inet6 accept_rtadv"
sshd_enable="YES"
moused_nondefault_enable="NO"
